name: .NET Core Self-Contained Build 2025

on:
  push:
    branches: [ "main", "dev" ]
    tags:
      - 'v*.*.*'
      - '!v*.*.*-*'
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2025
            rid: win-x64
            configuration: Release
          - os: ubuntu-latest
            rid: linux-x64
            configuration: Release

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout main repo
      uses: actions/checkout@v4
      with:
        path: mainrepo

    - name: Checkout SpoilerArchipelagoParser
      uses: actions/checkout@v4
      with:
        repository: NicolasValette/SpoilerArchipelagoParser
        path: SpoilerArchipelagoParser

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Compute VERSION from tag
      shell: bash
      run: |
        if [ "${{ github.ref_type }}" = "tag" ]; then
          raw="${GITHUB_REF_NAME#v}"; VERSION="${raw%%-*}"
        else
          VERSION="0.0.0"
        fi
        echo "VERSION=$VERSION" >> "$GITHUB_ENV"
        echo "Version: $VERSION"

    - name: Define project list
      shell: bash
      run: |
        {
          echo 'PROJECTS<<EOF'
          echo "nonibot:mainrepo/NoNiBot/NoNiBot.csproj"
          echo 'EOF'
        } >> "$GITHUB_ENV"

    - name: Publish main projects (self-contained, single-file)
      shell: bash
      run: |
        set -euo pipefail
        while IFS= read -r line; do
          key="${line%%:*}"
          proj="${line#*:}"
          echo "Publish $proj -> artifacts/$key"
          dotnet publish "$proj" \
            -c "${{ matrix.configuration }}" \
            -r "${{ matrix.rid }}" \
            -o "artifacts/$key" \
            -p:SelfContained=true \
            -p:PublishSingleFile=true \
            -p:PublishTrimmed=false \
            -p:IncludeAllContentForSelfExtract=true \
            -p:Version="${{ env.VERSION }}"
        done <<< "$PROJECTS"

    - name: Publish ApplicationConsoleReader
      shell: bash
      run: |
        set -euo pipefail
        dotnet publish "SpoilerArchipelagoParser/ApplicationConsoleReader/ApplicationConsoleReader.csproj" \
          -c "${{ matrix.configuration }}" \
          -r "${{ matrix.rid }}" \
          -o "artifacts/applicationconsolereader" \
          -p:SelfContained=true \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=false \
          -p:IncludeAllContentForSelfExtract=true

    - name: Prepare upload_dir
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p upload_dir

        if [ "${{ github.ref_type }}" = "tag" ]; then
          echo "Tag: copy without .pdb"
          find artifacts/nonibot -type f ! -iname '*.pdb' -exec cp {} upload_dir/ \;
        else
          echo "Branch: copy all files"
          find artifacts/nonibot -type f -exec cp {} upload_dir/ \;
        fi

    - name: Copy ApplicationConsoleReader executable to upload_dir root
      shell: bash
      run: |
        set -euo pipefail

        if [ "${{ matrix.rid }}" = "win-x64" ]; then
          exe_path="$(find artifacts/applicationconsolereader -maxdepth 1 -type f -iname 'ApplicationConsoleReader.exe' | head -n 1)"
        else
          exe_path="$(find artifacts/applicationconsolereader -maxdepth 1 -type f -iname 'ApplicationConsoleReader' | head -n 1)"
        fi

        if [ -z "${exe_path:-}" ]; then
          echo "ApplicationConsoleReader executable not found"
          exit 1
        fi

        cp "$exe_path" upload_dir/
        echo "Copied $(basename "$exe_path") to upload_dir root"

    - name: Copy command files (if present)
      shell: bash
      run: |
        set -euo pipefail
        src="mainrepo/Install/${{ matrix.rid }}"
        if [ -d "$src" ] && compgen -G "$src/*" > /dev/null; then
          cp -r "$src/"* upload_dir/
          echo "Copied from $src"
        else
          echo "No command files for $src"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: NoNiBot-${{ matrix.rid }}${{ github.ref_type == 'tag' && format('-{0}', github.ref_name) || '' }}
        path: upload_dir/

    - name: Create release_assets folder
      if: startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: mkdir -p release_assets

    - name: Create ZIP archive (Windows)
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows-2025'
      shell: pwsh
      run: |
        $filename = "NoNiBot-${{ matrix.rid }}-${{ github.ref_name }}"
        Compress-Archive -Path upload_dir\* -DestinationPath release_assets\$filename.zip

    - name: Create TAR.GZ archive (Linux)
      if: startsWith(github.ref, 'refs/tags/') && matrix.os != 'windows-2025'
      shell: bash
      run: |
        filename="NoNiBot-${{ matrix.rid }}-${{ github.ref_name }}"
        tar -czvf "release_assets/${filename}.tar.gz" -C upload_dir .

    - name: Create GitHub Draft Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: true
        files: release_assets/*
